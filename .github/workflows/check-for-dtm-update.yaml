name: "Download and release latest DTM spreadsheet"

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch: # allow manual runs too

permissions:
  contents: write
  pull-requests: write

jobs:

  run-and-release:
    runs-on: [self-hosted, macOS]

    outputs:
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
      pr_branch: ${{ steps.check_spreadsheets.outputs.branch }}

    env:
      RENV_PATHS_LIBRARY: ~/renv-cache/ice-detention-management

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # - uses: r-lib/actions/setup-r@v2

      # - name: System dependencies for xml2/curl
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Download data
        run: |
          mkdir -p inputs
          Rscript code/download-new-dtm.R

      - name: Check for new spreadsheet
        id: check_spreadsheets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="dtm-update-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          git add spreadsheets/
          if git diff --cached --quiet; then
            echo "new_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get the filenames of newly staged spreadsheets
          new_files=$(git diff --cached --name-only)

          # Check if any open PR already contains these files
          open_prs=$(gh pr list --state open --json number --jq '.[].number')
          for pr in $open_prs; do
            pr_files=$(gh pr view "$pr" --json files --jq '.files[].path')
            for file in $new_files; do
              if echo "$pr_files" | grep -qF "$file"; then
                echo "File '$file' already present in open PR #$pr — skipping."
                echo "new_files=false" >> $GITHUB_OUTPUT
                exit 0
              fi
            done
          done

          echo "new_files=true" >> $GITHUB_OUTPUT

      - name: Parse spreadsheets
        if: steps.check_spreadsheets.outputs.new_files == 'true'
        run: Rscript code/parse-spreadsheets.R

      - name: Commit data files with proactive sync and retry
        if: steps.check_spreadsheets.outputs.new_files == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ -n "$(git status --porcelain)" ]; then
            git add spreadsheets/ data/
            git commit -m "Update data via LFS [skip ci]"

            echo "Syncing with remote before push..."
            git pull --rebase origin main

            git push --set-upstream origin HEAD
          else
            echo "No changes to commit"
          fi

      - name: Create pull request
        id: create_pr
        if: steps.check_spreadsheets.outputs.new_files == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "Data update $(date +%Y-%m-%d)" \
            --body "Automated update: new DTM spreadsheet detected and parsed." \
            --reviewer graemeblair \
            --base main)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

  validate:
    needs: run-and-release
    if: needs.run-and-release.result == 'success' && needs.run-and-release.outputs.pr_url != ''
    runs-on: [self-hosted, macOS]

    env:
      RENV_PATHS_LIBRARY: ~/renv-cache/ice-detention-management

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.run-and-release.outputs.pr_branch }}
          lfs: true

      - uses: r-lib/actions/setup-renv@v2

      - name: Run pointblank checks
        env:
          CHECK_SUMMARY_PATH: /tmp/check-summary.md
        run: Rscript code/check-dtm.R || true

      - name: Comment results on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ needs.run-and-release.outputs.pr_url }}" \
            --body-file /tmp/check-summary.md
